<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Select your preferred session time for your Vedic astrology consultation with I Read Space. Choose from available time slots that work for you." />
  <link rel="canonical" href="https://ireadspace.com/schedule" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/Radicle (4).png">
  <link rel="apple-touch-icon" href="assets/images/Radicle (4).png">

  <!-- Open Graph -->
  <meta property="og:title" content="Select a Session Time | I Read Space" />
  <meta property="og:description" content="Select your preferred session time for your Vedic astrology consultation." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ireadspace.com/schedule" />
  <meta property="og:image" content="https://ireadspace.com/assets/images/lotus%20image.webp" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Select a Session Time | I Read Space" />
  <meta name="twitter:description" content="Select your preferred session time for your Vedic astrology consultation." />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500&family=Brygada+1918:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css?v=6" />
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <a href="index.html"><img src="assets/images/22.png" alt="I Read Space" /></a>
      </div>
    <div class="header-mobile-actions">
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="nav" id="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="index.html#areas">Services</a>
      <a href="insights.html">Insights</a>
      <a href="alternative-healing-practices.html">Healing</a>
      <a href="reset-now.html">Reset</a>
      <a href="index.html#contact">Contact</a>
      <a href="index.html#pricing" class="header-cta">Request a Session</a>
    </nav>
  </header>

  <!-- Schedule Section -->
  <section class="schedule" id="main-content">
    <h1>Select a session time</h1>
    <p class="schedule-sub">
      Choose a time that works for you. All sessions are conducted with prior preparation.
    </p>

    <div class="slots">

      <div class="slot-group">
        <h3>Morning</h3>
        <button type="button" class="slot" data-time="10:00 AM">10:00 AM</button>
        <button type="button" class="slot" data-time="11:30 AM">11:30 AM</button>
        <button type="button" class="slot" data-time="12:30 PM">12:30 PM</button>
      </div>

      <div class="slot-group">
        <h3>Afternoon</h3>
        <button type="button" class="slot" data-time="2:00 PM">2:00 PM</button>
        <button type="button" class="slot" data-time="4:00 PM">4:00 PM</button>
        <button type="button" class="slot" data-time="5:30 PM">5:30 PM</button>
      </div>

      <div class="slot-group">
        <h3>Evening</h3>
        <button type="button" class="slot" data-time="7:00 PM">7:00 PM</button>
        <button type="button" class="slot" data-time="8:00 PM">8:00 PM</button>
      </div>

    </div>

    <a class="cta" id="wa-link" href="#">
      Continue to WhatsApp
    </a>
  </section>

  <!-- Script -->
  <script>
    let selectedTime = "";
  
    const slots = document.querySelectorAll(".slot");
    const waLink = document.getElementById("wa-link");
  
    // Disable WA link initially
    waLink.style.pointerEvents = "none";
    waLink.style.opacity = "0.5";
  
    slots.forEach(slot => {
      slot.addEventListener("click", () => {
        selectedTime = slot.dataset.time;
  
        // Highlight selected slot
        slots.forEach(s => s.classList.remove("active"));
        slot.classList.add("active");
  
        // Enable WA link
        waLink.style.pointerEvents = "auto";
        waLink.style.opacity = "1";
  
        const message =
          "Hello, I’ve selected a session with I Read Space.%0A" +
          "Preferred slot: Next available " + selectedTime + " (IST)%0A"
          "Please share the payment details.";
  
        waLink.href =
          "https://wa.me/919217679635?text=" + message;
      });
    });
  </script>

  <!-- Mobile Menu Script -->
  <script src="js/mobile-menu.js"></script>

  <button id="faq-chat-button" class="faq-chat-button" aria-label="Open FAQ chat">
    ?
  </button>
  <div id="faq-chat-panel" class="faq-chat-panel">
    <div class="faq-chat-header">
      <h3>Have a Question?</h3>
      <button id="faq-chat-close" class="faq-chat-close" aria-label="Close chat">×</button>
    </div>
    <div id="faq-chat-content" class="faq-chat-content"></div>
  </div>
  <script src="js/faq-chat.js?v=7"></script>

</body>
</html>
